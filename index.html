<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" href="css/leaflet.css" />
    <link rel="stylesheet" href="css/L.Control.Layers.Tree.css" />
    <link rel="stylesheet" href="css/qgis2web.css" />
    <link rel="stylesheet" href="css/fontawesome-all.min.css" />
    <link rel="stylesheet" href="css/leaflet.photon.css" />
    <style>
        html,
        body,
        #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        #logo {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 1000;
        }
        #logo img {
            height: 55px;
        }
        #banner-aviso {
            position: fixed;
            bottom: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #999;
            border-left: 5px solid #e81426;
            padding: 10px 14px;
            font-family: 'Century Gothic', sans-serif;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            z-index: 9999;
            display: flex;
            align-items: center;
            max-width: 320px;
        }
        #banner-aviso span:first-child {
            margin-right: 8px;
            color: #e81426;
            font-size: 18px;
            transform: scale(1.3);
            display: inline-block;
        }
        /* Leyenda con solo título fijo */
        #legend-title {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.9);
            padding: 8px 12px;
            font-family: 'Century Gothic', sans-serif;
            font-size: 15px;
            font-weight: bold;
            color: #333;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            max-width: 270px;
            z-index: 1000;
        }
        /* Control de capas estilos */
        .leaflet-control-layers-overlays label {
            font-family: 'Century Gothic', sans-serif;
            font-size: 14px;
            margin-bottom: 6px;
            display: block;
        }
    </style>
    <title>Plan de Transporte Municipio de Florida</title>
</head>
<body>
    <div id="map"></div>

    <!-- Logo -->
    <div id="logo">
        <a href="https://www.estudiostecnicos.com" target="_blank" rel="noopener">
            <img
                src="https://estudiostecnicos.com/wp-content/uploads/2021/01/logo-trasnparente.png"
                alt="Logo Estudios Técnicos Inc."
            />
        </a>
    </div>

    <!-- Banner aviso -->
    <div id="banner-aviso">
        <span>⚠️</span>
        <span>El contenido mostrado es referencial y no representa información oficial.</span>
    </div>

    <script src="js/leaflet.js"></script>
    <script src="js/qgis2web_expressions.js"></script>
    <script src="js/L.Control.Layers.Tree.min.js"></script>
    <script src="js/leaflet.rotatedMarker.js"></script>
    <script src="js/leaflet.pattern.js"></script>
    <script src="js/leaflet-hash.js"></script>
    <script src="js/Autolinker.min.js"></script>
    <script src="js/rbush.min.js"></script>
    <script src="js/labelgun.min.js"></script>
    <script src="js/labels.js"></script>
    <script src="js/leaflet.photon.js"></script>
    <script src="data/Rutas_04_agosto_2025directions_1.js"></script>
    <script>
        var maxBounds = [
            [18.32, -66.65],
            [18.45, -66.50],
        ];

        var map = L.map('map', {
            zoomControl: false,
            maxZoom: 28,
            minZoom: 13,
            maxBounds: maxBounds,
            maxBoundsViscosity: 1.0,
        }).fitBounds(maxBounds);

        L.control.zoom({ position: 'topleft' }).addTo(map);
        new L.Hash(map);

        var autolinker = new Autolinker({ truncate: { length: 30, location: 'smart' } });

        map.createPane('pane_GoogleMaps_0');
        map.getPane('pane_GoogleMaps_0').style.zIndex = 400;
        var baseLayer = L.tileLayer(
            'https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',
            {
                pane: 'pane_GoogleMaps_0',
                opacity: 1.0,
                minZoom: 1,
                maxZoom: 28,
            }
        ).addTo(map);

        var colors = {
            'F1: CBD Loop': '#29ef23',
            'F2: Park - La Ceiba Loop': '#7790B2',
            'F3: Park - Parcelas Arroyo Loop': '#228761',
            'F4: CBD - Parcelas Selgas Loop': '#090E29',
            'F5: Las Tosas - Seoanes': '#E2A734',
            'F6: Altos y Alturas de Florida Loop': '#CBD5E2',
            'IM1: Florida - Barceloneta': '#E81426',
            'T1: CBD - Altos de Florida': '#F6CB38',
            'T2:  CBD - Estancias de Arroyo': '#E2A734',
            'T3: CBD - Reparto Seoanes': '#4d52d9',
            'T4: CBD - Comisión': '#D6752A',
        };

        // Agrupar features por line_name
        var routeLayers = {};
        json_Rutas_04_agosto_2025directions_1.features.forEach(function (feature) {
            var name = feature.properties.line_name;
            if (!routeLayers[name]) {
                routeLayers[name] = [];
            }
            routeLayers[name].push(feature);
        });

        var overlays = {};
        Object.keys(routeLayers).forEach(function (name) {
            var color = colors[name] || '#000000';
            var layer = L.geoJSON(routeLayers[name], {
                style: {
                    color: color,
                    weight: 3,
                    opacity: 0.7,
                    fillOpacity: 0,
                },
                onEachFeature: function (feature, layer) {
                    var popupContent =
                        '<div style="text-align:center; font-weight:bold; font-size:14px; color:' +
                        color +
                        '">' +
                        (feature.properties.full_name || '') +
                        '</div>';
                    layer.bindPopup(popupContent);
                },
            });
            overlays[name] = layer;
            layer.addTo(map);
        });

        // Capa Municipios visible y bloqueada (no en control)
        var municipiosLayer = L.geoJSON(null, {
            style: {
                color: '#666666',
                weight: 1,
                fillOpacity: 0.1,
            },
        }).addTo(map);

        L.control.layers(null, overlays, { collapsed: false }).addTo(map);
    </script>
</body>
</html>
